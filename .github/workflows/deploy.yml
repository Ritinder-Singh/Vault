name: Deploy Quartz to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build --directory projects

      - name: Deploy to VPS via SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > /tmp/vps_key
          chmod 600 /tmp/vps_key
          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd ~/Vault &&
            git pull origin main &&
            npm ci &&
            npx quartz build --directory projects
          '
